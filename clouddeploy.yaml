apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: version-app-pipeline
description: version app pipeline

serialPipeline:
  stages:
  - targetId: dev

  - targetId: prod
    strategy:
      standard:
        verify: false

    # ✅ THIS is the correct approval config
    deployParameters: {}
    profiles: []
    approvalConfigs:
    - approvalRequired: true

---
