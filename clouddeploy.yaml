kind: Target
metadata:
  name: dev
description: dev environment
gke:
  cluster: projects/project-f0e767ca-e0c1-4dd7-af0/locations/us-central1-a/clusters/demo-cluster

---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: prod
description: prod environment
gke:
  cluster: projects/project-f0e767ca-e0c1-4dd7-af0/locations/us-central1-a/clusters/demo-cluster