steps:
# 🔨 Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'gcr.io/$PROJECT_ID/version-app:$SHORT_SHA'
    - '.'

# 📦 Push Image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'gcr.io/$PROJECT_ID/version-app:$SHORT_SHA'

# 🚀 Create Cloud Deploy Release
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'deploy'
    - 'releases'
    - 'create'
    - 'release-$SHORT_SHA'
    - '--delivery-pipeline=version-app-pipeline'
    - '--region=us-central1'
    - '--images=version-app=gcr.io/$PROJECT_ID/version-app:$SHORT_SHA'

images:
  - 'gcr.io/$PROJECT_ID/version-app:$SHORT_SHA'

timeout: "900s"

options:
  logging: CLOUD_LOGGING_ONLY