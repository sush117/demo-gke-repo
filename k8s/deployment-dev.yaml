apiVersion: apps/v1
kind: Deployment
metadata:
  name: version-app-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: version-app
      env: dev
  template:
    metadata:
      labels:
        app: version-app
        env: dev
    spec:
      nodeSelector:
        env: dev   # 🔥 ensures it runs on dev pool

      containers:
      - name: version-app
        image: gcr.io/project-f0e767ca-e0c1-4dd7-af0/version-app:latest

        ports:
        - containerPort: 3000

        env:
        - name: VERSION